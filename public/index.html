<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>National Health Professionals Council</title>
    <!--
      Root redirect for the static export. output:'export' silently drops
      next.config's redirects(), so / → /en/ is handled here instead.

      Three layers, in order of speed, because this must work on a cheap
      phone with JS disabled or blocked:
        1. meta refresh  — works with no JS at all
        2. script        — fires first where JS is on, and uses replace()
                           so the back button does not trap the user here
        3. a plain link  — if both are blocked, the page is still usable
    -->
    <meta http-equiv="refresh" content="0; url=/en/" />
    <link rel="canonical" href="/en/" />
    <link rel="alternate" hreflang="en" href="/en/" />
    <link rel="alternate" hreflang="so" href="/so/" />
    <link rel="icon" href="/nhpc-stamp.png" />
    <script>
      window.location.replace('/en/');
    </script>
    <style>
      body {
        margin: 0;
        padding: 3rem 1rem;
        font-family: system-ui, sans-serif;
        color: #1a202c;
        text-align: center;
      }
      .bar { display: flex; height: 3px; margin: -3rem -1rem 2.5rem; }
      .bar i { display: block; height: 100%; }
      .bar .b { width: 62%; background: #0055aa; }
      .bar .r { width: 38%; background: #ff0018; }
      a { color: #0055aa; font-weight: 600; }
      p { margin: 0.5rem 0; }
      .so { color: #4a5568; }
    </style>
  </head>
  <body>
    <div class="bar" aria-hidden="true"><i class="b"></i><i class="r"></i></div>
    <p><a href="/en/">National Health Professionals Council</a></p>
    <p class="so" lang="so"><a href="/so/">Golaha Mihnadlayaasha Caafimaadka Qaranka</a></p>
  </body>
</html>
